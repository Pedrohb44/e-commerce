<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Forma de Pagamento - TechNova Store</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>

<div class="logo">TechNova Store</div>

<nav>
<a href="index.html">Home</a>
<a href="produtos.html">Produtos</a>
<a href="login.html">Login</a>
</nav>

</header>

<section class="container">

<div class="card pagamento-card">

<h2>💳 Escolha a Forma de Pagamento</h2>

<form onsubmit="confirmarPagamento(event)">

<label class="pagamento-opcao">
<input type="radio" name="pagamento" value="cartao" required>
<span>💳 Cartão de Crédito</span>
</label>

<label class="pagamento-opcao">
<input type="radio" name="pagamento" value="pix">
<span>PIX</span>
</label>

<label class="pagamento-opcao">
<input type="radio" name="pagamento" value="boleto">
<span>🏦 Boleto Bancário</span>
</label>

<div class="botoes-pagamento">

<a href="produtos.html" class="btn-secundario">
Voltar
</a>

<button type="submit">
Confirmar Pagamento
</button>

</div>

</form>

</div>

</section>

<footer>
<p>© 2026 TechNova Store | Todos os direitos reservados</p>
</footer>

<script>

function confirmarPagamento(event){

event.preventDefault()

let pagamento = document.querySelector('input[name="pagamento"]:checked')

if(!pagamento){
alert("Escolha uma forma de pagamento!")
return
}

alert("Pagamento realizado com sucesso!")

window.location.href = "confirmacao.html"

}

</script>

</body>
</html>
