<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagamento com Cartão</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<div class="logo">TechNova Store</div>
</header>

<section class="container">

<div class="card pagamento-card">

<h2>💳 Pagamento com Cartão</h2>

<form action="confirmacao.html">

<label>Número do Cartão</label>
<input type="text" placeholder="0000 0000 0000 0000" required>

<label>Nome no Cartão</label>
<input type="text" required>

<label>Validade</label>
<input type="month" required>

<label>CVV</label>
<input type="password" maxlength="3" required>

<button class="btn-azul">Confirmar Pagamento</button>

</form>

</div>

</section>

<footer>
<p>© 2026 TechNova Store</p>
</footer>

</body>
</html>
